name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC and provenance
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      # Auth happens via GitHub OIDC + npm Trusted Publishers (no NPM_TOKEN needed).
      - name: Publish to npm
        run: npm publish --workspaces --access public --provenance
