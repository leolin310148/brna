name: Publish to npm

on:
  release:
    types: [published]

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Validate version
        run: |
          version="${{ steps.version.outputs.version }}"

          node - "$version" <<'NODE'
          const version = process.argv[2];
          if (!/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Release tag must be a semver version, got ${version}`);
          }
          NODE

  publish:
    needs: [prepare-release, cli-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC and provenance
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Stamp package versions from release tag
        run: |
          node .github/scripts/stamp-release-version.mjs "${{ needs.prepare-release.outputs.version }}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      # Build schema dist up front so downstream packages' prepack scripts can
      # resolve `@brna/schema/dist/brna-1.schema.json` during `npm publish`.
      - name: Pre-build schema
        run: bun run --cwd packages/schema build:schema

      # Auth happens via GitHub OIDC + npm Trusted Publishers (no NPM_TOKEN needed).
      # Publishes per-workspace so we can skip versions that are already on the
      # registry — important when a previous run partially published.
      - name: Publish to npm
        run: |
          set -euo pipefail
          mapfile -t entries < <(node -e "
            const fs=require('fs');
            const path=require('path');
            const root=require('./package.json');
            const globs=root.workspaces||[];
            const dirs=new Set();
            for(const g of globs){
              if(g.endsWith('/*')){
                const base=g.slice(0,-2);
                for(const d of fs.readdirSync(base)){
                  const full=path.join(base,d);
                  if(fs.statSync(full).isDirectory()&&fs.existsSync(path.join(full,'package.json'))) dirs.add(full);
                }
              } else { dirs.add(g); }
            }
            for(const d of [...dirs].sort()){
              const pkg=JSON.parse(fs.readFileSync(path.join(d,'package.json'),'utf8'));
              if(pkg.private) continue;
              process.stdout.write(d+'\t'+pkg.name+'\t'+pkg.version+'\n');
            }
          ")
          # Prerelease versions go to the `next` dist-tag so `latest` keeps
          # pointing at the newest stable release.
          dist_tag="latest"
          case "${{ needs.prepare-release.outputs.version }}" in
            *-*) dist_tag="next" ;;
          esac
          for entry in "${entries[@]}"; do
            dir="${entry%%$'\t'*}"
            rest="${entry#*$'\t'}"
            name="${rest%%$'\t'*}"
            version="${rest##*$'\t'}"
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "Skipping $name@$version — already published"
              continue
            fi
            echo "Publishing $name@$version from $dir (tag: $dist_tag)"
            npm publish --workspace "$dir" --access public --provenance --tag "$dist_tag"
          done

  cli-smoke:
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Stamp package versions from release tag
        run: |
          node .github/scripts/stamp-release-version.mjs "${{ needs.prepare-release.outputs.version }}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: bun install

      - name: Pack and smoke-test CLI
        shell: bash
        run: |
          set -euo pipefail

          pack_dir="$PWD/.pack-smoke"
          smoke_dir="$PWD/.smoke-cli"
          mkdir -p "$pack_dir" "$smoke_dir"

          npm pack ./packages/schema --pack-destination "$pack_dir"
          npm pack ./packages/core --pack-destination "$pack_dir"
          npm pack ./packages/local-usage --pack-destination "$pack_dir"
          npm pack ./packages/mcp --pack-destination "$pack_dir"
          npm pack ./packages/cli --pack-destination "$pack_dir"

          cd "$smoke_dir"
          node -e "require('node:fs').writeFileSync('package.json', JSON.stringify({ name: 'brna-smoke', private: true }) + '\n')"
          npm install "$pack_dir"/brna-schema-*.tgz "$pack_dir"/brna-core-*.tgz "$pack_dir"/brna-local-usage-*.tgz "$pack_dir"/brna-mcp-*.tgz "$pack_dir"/brna-cli-*.tgz

          npx brna --help
          if npx brna doctor --metro http://localhost:1; then
            echo "doctor unexpectedly succeeded against a closed Metro port"
            exit 1
          fi
